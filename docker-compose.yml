# Local Postgres for conversation analysis pipeline.
# Run: docker compose up -d
# Then: DATABASE_URL=postgresql+psycopg://voice:voice@localhost:5432/voice_portfolio uv run alembic upgrade head
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_portfolio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
